<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0f14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FX Convert" />
  <title>FX Convert</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #0d0f14; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

    .app { display: flex; flex-direction: column; height: 100vh; max-width: 430px; margin: 0 auto; background: #0d0f14; }

    .phone-inner { flex: 1; overflow: hidden; }
    .pages { display: flex; transition: transform 0.35s cubic-bezier(.4,0,.2,1); height: 100%; }
    .page { width: 100vw; max-width: 430px; flex-shrink: 0; display: flex; flex-direction: column; height: 100%; overflow-y: auto; }

    .phone-header { background: #0d0f14; padding: 52px 20px 16px; border-bottom: 0.5px solid #1e2130; flex-shrink: 0; }
    .app-title { font-size: 11px; color: #a0aacc; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
    .app-heading { font-size: 22px; font-weight: 600; color: #f0f4ff; line-height: 1.2; }
    .accent { color: #b6f542; }

    .phone-body { padding: 16px 16px 20px; flex: 1; }
    .section-label { font-size: 10px; color: #5a6380; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; margin-top: 16px; }

    .currency-card { background: #151821; border: 0.5px solid #1e2130; border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; transition: border-color 0.15s; }
    .currency-card.focused { border-color: #b6f542; }
    .flag-circle { width: 38px; height: 38px; border-radius: 50%; background: #1e2130; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .currency-info { flex: 1; min-width: 0; }
    .currency-code { font-size: 13px; font-weight: 600; color: #f0f4ff; line-height: 1; margin-bottom: 2px; }
    .currency-fullname { font-size: 10px; color: #5a6380; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .currency-input { background: transparent; border: none; outline: none; font-size: 20px; font-weight: 600; color: #f0f4ff; text-align: right; width: 100px; font-family: inherit; }
    .currency-input::placeholder { color: #2e3450; }
    .currency-input.has-value { color: #b6f542; }

    .rate-pill { display: inline-flex; align-items: center; background: #151821; border: 0.5px solid #1e2130; border-radius: 20px; padding: 5px 12px; gap: 6px; margin-top: 12px; }
    .rate-dot { width: 6px; height: 6px; border-radius: 50%; background: #b6f542; }
    .rate-text { font-size: 11px; color: #5a6380; }
    .rate-text span { color: #a0aacc; }

    .nav-bar { display: flex; justify-content: space-around; align-items: center; padding: 12px 10px 28px; border-top: 0.5px solid #1e2130; background: #0d0f14; flex-shrink: 0; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 6px 20px; border-radius: 12px; transition: background 0.15s; }
    .nav-btn.active .nav-icon { stroke: #b6f542; }
    .nav-btn.active .nav-label { color: #b6f542; }
    .nav-icon { stroke: #5a6380; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.15s; }
    .nav-label { font-size: 10px; color: #5a6380; transition: color 0.15s; }

    .period-tabs { display: flex; background: #151821; border-radius: 12px; padding: 3px; gap: 2px; margin-bottom: 16px; }
    .period-btn { flex: 1; padding: 7px 0; border: none; background: transparent; color: #5a6380; font-size: 12px; font-weight: 600; border-radius: 9px; cursor: pointer; transition: background 0.15s, color 0.15s; font-family: inherit; }
    .period-btn.active { background: #b6f542; color: #0d0f14; }

    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #a0aacc; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .stat-row { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-top: 14px; }
    .stat-card { background: #151821; border-radius: 12px; padding: 10px 12px; }
    .stat-label { font-size: 10px; color: #5a6380; margin-bottom: 4px; }
    .stat-val { font-size: 15px; font-weight: 600; color: #f0f4ff; }
    .stat-val.up { color: #b6f542; }
    .stat-val.down { color: #ff5c5c; }

    #strengthChart { display: block; }
  </style>
</head>
<body>
<div class="app">
  <div class="phone-inner" id="phone-inner">
    <div class="pages" id="pages">

      <div class="page" id="page-convert">
        <div class="phone-header">
          <div class="app-title">Currency</div>
          <div class="app-heading">Convert <span class="accent">instantly</span></div>
        </div>
        <div class="phone-body">
          <div class="section-label">Enter amount</div>
          <div id="cards-container"></div>
          <div class="rate-pill">
            <div class="rate-dot"></div>
            <div class="rate-text">Live rates · <span>Mar 23, 2026</span></div>
          </div>
        </div>
      </div>

      <div class="page" id="page-chart">
        <div class="phone-header">
          <div class="app-title">Markets</div>
          <div class="app-heading">Strength <span class="accent">vs USD</span></div>
        </div>
        <div class="phone-body">
          <div class="period-tabs" id="period-tabs">
            <button class="period-btn active" data-period="1d">1D</button>
            <button class="period-btn" data-period="1w">1W</button>
            <button class="period-btn" data-period="1y">1Y</button>
          </div>
          <div class="legend" id="chart-legend"></div>
          <div style="position: relative; width: 100%; height: 210px;">
            <canvas id="strengthChart"></canvas>
          </div>
          <div class="stat-row" id="stat-row"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="nav-bar">
    <button class="nav-btn active" id="nav-convert" onclick="switchPage(0)">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 20 20">
        <rect x="3" y="3" width="6" height="6" rx="1.5"/>
        <rect x="11" y="3" width="6" height="6" rx="1.5"/>
        <rect x="3" y="11" width="6" height="6" rx="1.5"/>
        <rect x="11" y="11" width="6" height="6" rx="1.5"/>
      </svg>
      <span class="nav-label">Convert</span>
    </button>
    <button class="nav-btn" id="nav-chart" onclick="switchPage(1)">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 20 20">
        <polyline points="2,15 7,9 11,12 18,4"/>
        <line x1="2" y1="18" x2="18" y2="18"/>
      </svg>
      <span class="nav-label">Markets</span>
    </button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const currencies = [
  { code: "USD", name: "US Dollar",          flag: "🇺🇸", rate: 1,      color: "#b6f542" },
  { code: "AED", name: "Emirati Dirham",     flag: "🇦🇪", rate: 3.6725, color: "#5b9cf6" },
  { code: "SZL", name: "Swazi Lilangeni",    flag: "🇸🇿", rate: 15.94,  color: "#f5a623" },
  { code: "ZAR", name: "South African Rand", flag: "🇿🇦", rate: 16.87,  color: "#ff6b6b" },
];

const container = document.getElementById("cards-container");
currencies.forEach((c, i) => {
  const card = document.createElement("div");
  card.className = "currency-card";
  card.innerHTML = `
    <div class="flag-circle">${c.flag}</div>
    <div class="currency-info">
      <div class="currency-code">${c.code}</div>
      <div class="currency-fullname">${c.name}</div>
    </div>
    <input class="currency-input" id="inp-${i}" type="number" inputmode="decimal" placeholder="0.00" min="0" step="any" />
  `;
  container.appendChild(card);
  const inp = card.querySelector("input");
  inp.addEventListener("focus", () => {
    document.querySelectorAll(".currency-card").forEach(el => el.classList.remove("focused"));
    card.classList.add("focused");
  });
  inp.addEventListener("blur", () => card.classList.remove("focused"));
  inp.addEventListener("input", () => {
    const raw = parseFloat(inp.value);
    inp.classList.toggle("has-value", !isNaN(raw) && inp.value !== "");
    if (isNaN(raw) || inp.value === "") {
      currencies.forEach((_, j) => { if (j !== i) { const o = document.getElementById("inp-"+j); o.value=""; o.classList.remove("has-value"); } });
      return;
    }
    const usd = raw / c.rate;
    currencies.forEach((other, j) => {
      if (j !== i) {
        const o = document.getElementById("inp-"+j);
        const v = usd * other.rate;
        o.value = v % 1 === 0 ? v.toFixed(0) : v.toFixed(2);
        o.classList.add("has-value");
      }
    });
  });
});

function switchPage(idx) {
  const pagesEl = document.getElementById("pages");
  const w = document.getElementById("page-convert").offsetWidth;
  pagesEl.style.transform = `translateX(${-idx * w}px)`;
  document.getElementById("nav-convert").classList.toggle("active", idx === 0);
  document.getElementById("nav-chart").classList.toggle("active", idx === 1);
}

function seed(s) { let x = Math.sin(s) * 10000; return x - Math.floor(x); }
function genSeries(baseVal, n, vol, s) {
  let v = baseVal, arr = [];
  for (let i = 0; i < n; i++) { v += (seed(s + i) - 0.5) * vol; v = Math.max(baseVal * 0.92, Math.min(baseVal * 1.08, v)); arr.push(parseFloat(v.toFixed(4))); }
  return arr;
}

const periodConfig = {
  "1d": { pts: 24, labels: Array.from({length:24},(_,i)=>i%4===0?(i===0?"12am":i<12?i+"am":i===12?"12pm":(i-12)+"pm"):""), vol: { AED:0.0005, SZL:0.08, ZAR:0.09 } },
  "1w": { pts: 7,  labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"], vol: { AED:0.002, SZL:0.3, ZAR:0.35 } },
  "1y": { pts: 12, labels: ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"], vol: { AED:0.01, SZL:1.5, ZAR:1.8 } },
};

const nonUSD = currencies.slice(1);
let chart = null;

function buildLegend() {
  const leg = document.getElementById("chart-legend");
  nonUSD.forEach(c => {
    const el = document.createElement("div");
    el.className = "legend-item";
    el.innerHTML = `<div class="legend-dot" style="background:${c.color}"></div>${c.flag} ${c.code}`;
    leg.appendChild(el);
  });
}

function buildStats(period) {
  const cfg = periodConfig[period];
  const row = document.getElementById("stat-row");
  row.innerHTML = "";
  nonUSD.forEach((c, ci) => {
    const series = genSeries(c.rate, cfg.pts, cfg.vol[c.code], (ci+1)*77 + period.charCodeAt(0));
    const pct = ((series[series.length-1] - series[0]) / series[0] * 100).toFixed(2);
    const up = parseFloat(pct) >= 0;
    const card = document.createElement("div");
    card.className = "stat-card";
    card.innerHTML = `<div class="stat-label">${c.flag} ${c.code}/USD</div><div class="stat-val ${up?'up':'down'}">${up?'+':''}${pct}%</div>`;
    row.appendChild(card);
  });
}

function buildChart(period) {
  const cfg = periodConfig[period];
  const datasets = nonUSD.map((c, ci) => ({
    label: c.code,
    data: genSeries(c.rate, cfg.pts, cfg.vol[c.code], (ci+1)*77 + period.charCodeAt(0)),
    borderColor: c.color,
    backgroundColor: "transparent",
    borderWidth: 2,
    pointRadius: 0,
    tension: 0.4,
  }));
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("strengthChart"), {
    type: "line",
    data: { labels: cfg.labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: "index", intersect: false,
          backgroundColor: "#151821", borderColor: "#1e2130", borderWidth: 1,
          titleColor: "#a0aacc", bodyColor: "#f0f4ff", padding: 8,
          callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(4)}` }
        }
      },
      scales: {
        x: { ticks: { color: "#5a6380", font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 6 }, grid: { color: "#1e2130" } },
        y: { ticks: { color: "#5a6380", font: { size: 10 }, callback: v => v.toFixed(1) }, grid: { color: "#1e2130" } }
      }
    }
  });
  buildStats(period);
}

buildLegend();
buildChart("1d");

document.getElementById("period-tabs").addEventListener("click", e => {
  const btn = e.target.closest(".period-btn");
  if (!btn) return;
  document.querySelectorAll(".period-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  buildChart(btn.dataset.period);
});

window.addEventListener("resize", () => {
  const idx = document.getElementById("nav-chart").classList.contains("active") ? 1 : 0;
  switchPage(idx);
});
</script>
</body>
</html>
