<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        body {
            background-color: #121212;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: #fff;
        }
        h1 {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <input type="number" id="usd" placeholder="USD" oninput="convert('usd')">
        <input type="number" id="mad" placeholder="Moroccan Dirham (MAD)" oninput="convert('mad')">
        <input type="number" id="zar" placeholder="South African Rand (ZAR)" oninput="convert('zar')">
    </div>

    <script>
        const rates = {
            usd: 1,
            mad: 9.41,  // Moroccan Dirham
            zar: 0.060  // South African Rand
        };

        function convert(inputCurrency) {
            const usdValue = document.getElementById('usd').value;
            const madValue = document.getElementById('mad').value;
            const zarValue = document.getElementById('zar').value;

            if (inputCurrency === 'usd') {
                document.getElementById('mad').value = (usdValue * rates.mad).toFixed(2);
                document.getElementById('zar').value = (usdValue * rates.zar).toFixed(2);
            } else if (inputCurrency === 'mad') {
                document.getElementById('usd').value = (madValue / rates.mad).toFixed(2);
                document.getElementById('zar').value = (madValue / rates.mad * rates.zar).toFixed(2);
            } else if (inputCurrency === 'zar') {
                document.getElementById('usd').value = (zarValue / rates.zar).toFixed(2);
                document.getElementById('mad').value = (zarValue / rates.zar * rates.mad).toFixed(2);
            }
        }
    </script>
</body>
</html>
